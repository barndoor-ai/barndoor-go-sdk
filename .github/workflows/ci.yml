name: CI

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7

      - name: Lint and security scan
        run: make lint security

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: make download

      - name: Run tests with coverage
        run: make coverage

      - name: Upload coverage
        if: matrix.go-version == '1.23'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
